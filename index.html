<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseTasks</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>PulseTasks</h1>
    <button id="dark-mode-toggle">Modo Oscuro</button>
  </header>

  <div class="layout">
    <aside>
      <h3>Categorías</h3>
      <ul>
        <li>Trabajo</li>
        <li>Personal</li>
        <li>Estudio</li>
      </ul>
    </aside>

    <main>
      
      /*Formulário*/

      <form id="task-form">
        <input type="text" id="task-input" placeholder="Nueva tarea..." required>
        <select id="category-select">
          <option value="Trabajo">Trabajo</option>
          <option value="Personal">Personal</option>
          <option value="Estudio">Estudio</option>
        </select>
        <select id="priority-select">
          <option value="high">Alta</option>
          <option value="medium">Media</option>
          <option value="low">Baja</option>
        </select>
        <button type="submit">Añadir Tarea</button>
      </form>

      <!-- Busca -->
      <input type="text" id="search-input" placeholder="Buscar tareas...">

      <!-- Lista de tarefas  -->
      <section id="task-list" class="task-list"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
