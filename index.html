<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PulseTasks</title>

<link rel="stylesheet" href="output.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen font-[Inter]">

<header class="bg-blue-600 dark:bg-blue-800 text-white p-5 flex justify-between items-center shadow">

<h1 class="text-3xl font-bold">PulseTasks</h1>

<button id="dark-mode-toggle" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition">
🌙
</button>

</header>

<div class="flex min-h-[calc(100vh-80px)]">

<aside class="w-64 bg-white dark:bg-zinc-900 border-r border-zinc-200 dark:border-zinc-800 p-6 hidden lg:block">

<h3 class="text-lg font-semibold mb-4">Categorías</h3>

<ul class="space-y-2">

<li class="hover:text-blue-500 cursor-pointer">Trabajo</li>
<li class="hover:text-blue-500 cursor-pointer">Personal</li>
<li class="hover:text-blue-500 cursor-pointer">Estudio</li>

</ul>

</aside>

<main class="flex-1 p-8">

<form id="task-form" class="flex gap-3 mb-6 flex-wrap">

<input
id="task-input"
type="text"
placeholder="Nueva tarea..."
class="flex-1 p-3 border rounded-lg dark:bg-zinc-800 dark:border-zinc-700"
required
>

<select id="category-select" class="p-3 border rounded-lg dark:bg-zinc-800 dark:border-zinc-700">

<option>Trabajo</option>
<option>Personal</option>
<option>Estudio</option>

</select>

<select id="priority-select" class="p-3 border rounded-lg dark:bg-zinc-800 dark:border-zinc-700">

<option value="high">Alta</option>
<option value="medium">Media</option>
<option value="low">Baja</option>

</select>

<button class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-lg transition">

Añadir

</button>

</form>

<input
id="search-input"
type="text"
placeholder="Buscar tarea..."
class="w-full p-3 mb-6 border rounded-lg dark:bg-zinc-800 dark:border-zinc-700"
/>

<section id="task-list" class="space-y-4"></section>

</main>

</div>

<script src="app.js"></script>

<script>

const toggle = document.getElementById("dark-mode-toggle")

toggle.addEventListener("click", () => {

document.documentElement.classList.toggle("dark")

})

</script>

</body>
</html>
