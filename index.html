<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>TaskFlow</h1>
  </header>

  <div class="layout">
    <aside>
      <h3>Categorías</h3>
      <ul>
        <li>Trabajo</li>
        <li>Personal</li>
        <li>Estudio</li>
      </ul>
    </aside>

    <main>
      <section class="task-list">
        <div class="task">
          <span class="title">Diseñar landing</span>
          <span class="category">Trabajo</span>
          <span class="badge high">Alta</span>
        </div>

        <div class="task">
          <span class="title">Leer documentación</span>
          <span class="category">Estudio</span>
          <span class="badge medium">Media</span>
        </div>
      </section>
    </main>
  </div>

</body>
</html>
